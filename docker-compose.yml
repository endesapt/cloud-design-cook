services:
  postgres:
    image: postgres:16-alpine
    container_name: iaas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iaas_demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iaas_demo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
